<!DOCTYPE html>
<html lang="pt-br"> <!--Linguagem-->
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
    * {
    margin: 0;
    border: 0;
    padding: 0;

    font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif
}
body{
    padding: 20px;
    background-color: rgb(40, 40, 40);
    color: whitesmoke;
    display: flex;
    gap: 20px;
    justify-content: space-around;
    align-items: center;
    flex-direction: column;
}
textarea{
    padding: 5px;
    color: whitesmoke;
    border: 2px solid green;
    background-color: rgb(35, 35, 35);
    border-radius: 5px;
    font-family: arial;
    outline: none;
    resize: none;
    overflow: scroll;
    scrollbar-width: none;
}
button{
    padding: 5px;
    border: 1px solid rgb(3, 73, 3);
    border-radius: 10px;
    font-family: arial;
    font-size: 15px;
    background-color: green;
    color: whitesmoke;
}
button:hover{
    cursor: pointer;
    background-color: rgb(0, 195, 0);

}
.textIA{
    background-color: rgba(128, 128, 128, 0.556);
    border: 1px solid rgb(128, 128, 128);
    border-radius: 1px;
    width: 60%;
    max-width: 400px;
}
        </style>
        <title>Document</title>
    </head>
    <body>

        <h1>
            Gerador de receitas 
                <b style=" color: rgb(0, 128, 0)">
                por IA
                </b>
        </h1>
        
        <textarea id="input-receita" rows="2" placeholder="Digite um alimento que deseja a receita"></textarea>
        
        <button id="gerador">Gerar Receita</button>
        
        <label for="receita">Receita:</label>
        
        <textarea name="receita" id="resultado" rows="auto"  disabled></textarea>
    </body>
    <script ></script>
</html>
